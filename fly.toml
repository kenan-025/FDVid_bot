app = "free-video-downloader-bot"

[build]
  builder = "paketobuildpacks/builder:base"

[env]
  # هذا مكان المتغيرات حقك، بس نحطهم كـ Secrets أحسن

[http_service]
  internal_port = 8080
  force_https = false
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  
